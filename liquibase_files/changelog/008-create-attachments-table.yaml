databaseChangeLog:
  - changeSet:
      id: 008-create-attachments-table
      author: aditya

      changes:
        - createTable:
            tableName: attachments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true

              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: file_url
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: attachments
            baseColumnNames: task_id
            referencedTableName: tasks
            referencedColumnNames: id
            constraintName: fk_attachments_task

      rollback:
        - dropTable:
            tableName: attachments